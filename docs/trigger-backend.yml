# Template: place this file at .github/workflows/notify-deploy.yml
# inside the devlucasvcarvalho/XColor-back repository.
#
# This workflow fires whenever a push lands on the dev, test, or production
# branch and sends a repository_dispatch event to XColor-Deploy so that
# the sync-backend pipeline runs automatically.
#
# Required secret in XColor-back:
#   DEPLOY_REPO_TOKEN — a GitHub Personal Access Token (classic) that has
#   the "repo" scope for devlucasvcarvalho/XColor-Deploy.

name: Notify XColor-Deploy (backend)

on:
  push:
    branches:
      - dev
      - test
      - production

jobs:
  dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Send repository_dispatch to XColor-Deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DEPLOY_REPO_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'devlucasvcarvalho',
              repo:  'XColor-Deploy',
              event_type: 'backend-push',
              client_payload: {
                branch: context.ref.replace('refs/heads/', ''),
                sha:    context.sha,
                repo:   context.repo.repo,
              },
            });
            console.log(`Dispatched backend-push for branch ${context.ref}`);
