version: "3.9"

services:
  backend:
    build: ./XColor-back
    container_name: backend-xcolor
    ports:
      - "5000:80"
    networks:
      - app-xcolor-network

  frontend:
    build: ./XColor-front
    container_name: frontend-xcolor
    ports:
      - "3000:80"
    depends_on:
      - backend-xcolor
    networks:
      - app-xcolor-network

networks:
  app-xcolor-network:
    driver: bridge