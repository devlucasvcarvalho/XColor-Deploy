name: Sync Backend

on:
  repository_dispatch:
    types: [backend-push]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (dev / test / production)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - production

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # GITHUB_TOKEN is not used for write operations; pushes use DEPLOY_TOKEN

    steps:
      - name: Determine target branch
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            BRANCH="${{ github.event.client_payload.branch }}"
          else
            BRANCH="${{ inputs.branch }}"
          fi

          # Normalize to lowercase
          BRANCH=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]')

          # Validate allowed branches
          if [[ "$BRANCH" != "dev" && "$BRANCH" != "test" && "$BRANCH" != "production" ]]; then
            echo "::error::Invalid branch '$BRANCH'. Must be one of: dev, test, production"
            exit 1
          fi

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Checkout XColor-Deploy on target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.vars.outputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.DEPLOY_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone XColor-back and sync files
        env:
          BRANCH: ${{ steps.vars.outputs.branch }}
          BACKEND_REPO: https://github.com/devlucasvcarvalho/XColor-back.git
        run: |
          # Clone the source branch of the backend repository
          if ! git clone --depth 1 --branch "$BRANCH" "$BACKEND_REPO" /tmp/XColor-back; then
            echo "::error::Failed to clone branch '$BRANCH' from $BACKEND_REPO. Make sure the branch exists in XColor-back."
            exit 1
          fi

          # Replace the backend/ directory with the latest content
          rm -rf backend/
          mkdir -p backend
          cp -r /tmp/XColor-back/. backend/
          rm -rf backend/.git

          # Commit and push only if there are actual changes
          git add backend/
          if git diff --staged --quiet; then
            echo "No changes detected — nothing to commit."
          else
            COMMIT_SHA=$(git -C /tmp/XColor-back rev-parse --short HEAD)
            git commit -m "sync(backend): update from XColor-back/$BRANCH @ $COMMIT_SHA"
            git push origin "$BRANCH"
          fi
